spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline_test
    username: ${DB_USER:raisetime}
    password: ${DB_PASSWORD:password}
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

app:
  upload-dir: ${UPLOAD_DIR:build/test-uploads}

jwt:
  secret: test-only-secret-key-for-jwt-signing-32chars
  access-token-validity: 30m
  refresh-token-validity: 14d
