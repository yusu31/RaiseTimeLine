spring:
  application:
    name: raise-time-line
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: ${DB_USER:raisetime}
    password: ${DB_PASSWORD:password}
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

app:
  upload-dir: ${UPLOAD_DIR:uploads}

jwt:
  secret: ${JWT_SECRET:local-dev-only-secret-key-please-change-32chars}
  access-token-validity: ${JWT_ACCESS_VALIDITY:30m}
  refresh-token-validity: ${JWT_REFRESH_VALIDITY:14d}
