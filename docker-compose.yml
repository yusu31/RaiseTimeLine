services:
  postgres:
    image: postgres:17
    container_name: raisetimeline-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: raisetimeline
      POSTGRES_USER: ${DB_USER:-raisetime}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
volumes:
  postgres_data:
